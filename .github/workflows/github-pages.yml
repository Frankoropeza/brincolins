# Deploy único del sitio. brincolins.com lo sirve GitHub Pages; Cloudflare
# solo actúa de proxy DNS por delante (las cabeceras de producción muestran
# `server: cloudflare` pero `x-github-request-id` + varnish como origen).
#
# Antes convivía con deploy.yml (Cloudflare Pages), que publicaba a
# brincolins.pages.dev — una segunda copia que nadie visitaba. Se retiró en
# jul 2026, junto con deploy.yml.cfbak. El `astro check` que corría aquel
# workflow se rescató a este: era el único gate de calidad del repo, y estaba
# en el pipeline que NO servía producción.
name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "gh-pages-brincolins"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # --include=dev explícito: si el runner trae NODE_ENV=production o
      # npm config omit=dev, npm se salta las devDependencies en silencio y
      # @astrojs/check no se instala. Sin él, `astro check` intentaría
      # descargarse en cada run (lento y frágil) o directamente fallaría.
      - run: npm ci --include=dev || npm install --include=dev
      # Gate de tipos ANTES del build: si falla, no se publica nada.
      # Es lo que destapó que PageLayout descartaba en silencio el JSON-LD
      # de los salones del directorio.
      - run: npx astro check
      - run: npm run build
      # Huella del commit DENTRO del artefacto publicado. El gate final se la
      # pide al dominio: si no la devuelve, el deploy no llego a produccion.
      # Sin punto inicial a proposito (los dotfiles pueden no servirse).
      - name: Sellar build-id
        run: echo "${{ github.sha }}" > dist/build-id.txt
      - run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      # ─── GATE REAL: verifica el DOMINIO, no el build ───
      # Un deploy verde solo prueba que el artefacto se subio. NO prueba que el
      # visitante lo vea: el DNS puede apuntar a otro origen (p.ej. un GitHub
      # Pages congelado detras del proxy de Cloudflare). Cuatro sitios del
      # portafolio estuvieron asi entre 3 semanas y 5 meses, en verde.
      - name: Verificar que el dominio sirve este commit
        run: |
          DOMINIO="brincolins.com"
          for i in $(seq 1 12); do
            sleep 10
            # cache-bust obligatorio: sin el, el edge devuelve el valor viejo y da falso verde
            LIVE=$(curl -fsSL --max-time 15 "https://$DOMINIO/build-id.txt?cb=${RANDOM}${i}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              echo "OK — $DOMINIO sirve ${GITHUB_SHA:0:12}"
              exit 0
            fi
            echo "intento $i/12 — el dominio devuelve '${LIVE:0:12}', esperado '${GITHUB_SHA:0:12}'"
          done
          echo "::error::$DOMINIO NO sirve este build tras 2 min. El deploy fue verde, pero el dominio apunta a otro origen (revisar: custom domain del proyecto Pages, DNS de la zona, y GitHub Pages activo en el repo)."
          exit 1
