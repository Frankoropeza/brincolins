# Deploy único del sitio. brincolins.com lo sirve GitHub Pages; Cloudflare
# solo actúa de proxy DNS por delante (las cabeceras de producción muestran
# `server: cloudflare` pero `x-github-request-id` + varnish como origen).
#
# Antes convivía con deploy.yml (Cloudflare Pages), que publicaba a
# brincolins.pages.dev — una segunda copia que nadie visitaba. Se retiró en
# jul 2026, junto con deploy.yml.cfbak. El `astro check` que corría aquel
# workflow se rescató a este: era el único gate de calidad del repo, y estaba
# en el pipeline que NO servía producción.
name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "gh-pages-brincolins"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # --include=dev explícito: si el runner trae NODE_ENV=production o
      # npm config omit=dev, npm se salta las devDependencies en silencio y
      # @astrojs/check no se instala. Sin él, `astro check` intentaría
      # descargarse en cada run (lento y frágil) o directamente fallaría.
      - run: npm ci --include=dev || npm install --include=dev
      # Gate de tipos ANTES del build: si falla, no se publica nada.
      # Es lo que destapó que PageLayout descartaba en silencio el JSON-LD
      # de los salones del directorio.
      - run: npx astro check
      - run: npm run build
      - run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
